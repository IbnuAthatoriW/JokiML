name: jokiml_mobile
description: "JokiML - Mobile Legends Rank Booster App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP request ke Laravel backend
  http: ^1.2.0

  # HTTP client yang lebih lengkap untuk request API
  dio: ^5.4.0

  # Simpan token login (SharedPreferences)
  shared_preferences: ^2.3.1

  # Pilih foto dari galeri (bukti pembayaran)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
